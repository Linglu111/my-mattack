# Configuration for ensemble_3models.py

defaults:
  - _self_

data:
  batch_size: 1   # 每批次处理一张图
  num_samples: 100  # 处理100张图
  output: "./LAT"  # 输出目录
  cle_data_path: "resources/images/bigscale"  # 干净图像目录
  tgt_data_path: "resources/images/target_images"  # 目标图像目录

optim:
  alpha: 1.0  # 步长
  epsilon: 16  # 扰动上限（像素值）
  steps: 300  # 迭代步数

model:
  input_res: 224  # 输入图像分辨率
  use_source_crop: true
  use_target_crop: true
  crop_scale: [0.5, 0.9] 
  ensemble: true  # 是否使用模型集成
  device: "cuda:0"  # Using GPU 1
  backbone: ["B16", "B32", "Laion"]  # Use all models in ensemble

wandb:
  project: "local_adversarial_attack"
  entity: "104754251506@henu.edu.cn" # fill your wandb entity

blackbox:
  model_name: "gemini"  # Can be gpt4o, claude, gemini, gpt_4v
  batch_size: 1
  timeout: 30

attack: 'fgsm' # [fgsm, mifgsm, pgd]  # 攻击方法选择